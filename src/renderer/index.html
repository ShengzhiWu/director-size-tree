<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Size Tree</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar">
        <div>
          <h1>Director Size Tree</h1>
          <p id="summary">Ready to scan</p>
        </div>
        <div class="toolbar-actions">
          <input id="scanPathInput" class="path-input" type="text" placeholder="Optional root path">
          <label class="label-toggle">
            <input id="showLabelsToggle" type="checkbox" checked>
            <span>Show names</span>
          </label>
          <button id="scanButton" type="button">Scan</button>
        </div>
      </header>

      <section class="viewer">
        <svg id="treeSvg" role="img" aria-label="Disk and directory size chart"></svg>
        <div id="emptyState">Click Scan to read disk usage</div>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
